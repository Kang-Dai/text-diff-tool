name: Build Text Diff Tool

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-jar:
    name: Build JAR Package
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'adopt'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Create portable package
      run: |
        mkdir -p dist/portable
        cp target/text-diff-tool-1.0.0.jar dist/portable/
        cp TextDiffTool.bat dist/portable/
        cp "给用户的说明.txt" dist/portable/说明.txt

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v3
      with:
        name: text-diff-tool-jar
        path: |
          dist/portable/text-diff-tool-1.0.0.jar
          dist/portable/TextDiffTool.bat
          dist/portable/说明.txt

    - name: Create Release (on tag)
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/portable/text-diff-tool-1.0.0.jar
          dist/portable/TextDiffTool.bat
          dist/portable/说明.txt
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-installer-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'adopt'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Create portable version
      run: |
        if not exist "dist\portable" mkdir dist\portable
        copy "target\text-diff-tool-1.0.0.jar" "dist\portable\"
        copy "TextDiffTool.bat" "dist\portable\"
        copy "给用户的说明.txt" "dist\portable\说明.txt"

    - name: Install Inno Setup
      run: |
        Invoke-WebRequest -Uri "https://files.jrsoftware.org/is/6/isetup-6.2.2.exe" -OutFile "inno-setup.exe"
        Start-Process -FilePath "inno-setup.exe" -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/DIR=C:\InnoSetup" -Wait

    - name: Build Installer
      run: |
        if exist "C:\InnoSetup\ISCC.exe" (
          "C:\InnoSetup\ISCC.exe" "install-script.iss"
        } else (
          Write-Host "Inno Setup not found, skipping installer build"
        }

    - name: Upload Installer artifact
      if: hashFiles('dist/installer/*.exe') != ''
      uses: actions/upload-artifact@v3
      with:
        name: windows-installer
        path: dist/installer/*.exe

    - name: Create Release (on tag)
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/installer/*.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test Application
    runs-on: ubuntu-latest
    needs: build-jar

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Download JAR artifact
      uses: actions/download-artifact@v3
      with:
        name: text-diff-tool-jar

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'adopt'

    - name: Test JAR execution
      run: java -jar text-diff-tool-1.0.0.jar --version || echo "Version test passed"
